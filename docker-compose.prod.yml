services:
  frontend-prod:
    image: ${REGISTRY:-local}/shop-frontend:${IMAGE_TAG:-latest}
    container_name: shop-frontend-prod
    ports:
      - "8005:80"
    depends_on:
      - backend-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  backend-prod:
    image: ${REGISTRY:-local}/shop-backend:${IMAGE_TAG:-latest}
    container_name: shop-backend-prod
    ports:
      - "8085:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-prod:5432/shopdb
      - SPRING_DATASOURCE_USERNAME=shop_user_prod
      - SPRING_DATASOURCE_PASSWORD=shop_pass_prod
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  db-prod:
    image: postgres:15-alpine
    container_name: shop-db-prod
    environment:
      - POSTGRES_USER=shop_user_prod
      - POSTGRES_PASSWORD=shop_pass_prod
      - POSTGRES_DB=shopdb
    ports:
      - "5434:5432"
    volumes:
      - shop_pgdata_prod:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

volumes:
  shop_pgdata_prod:
