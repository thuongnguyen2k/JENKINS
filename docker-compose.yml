services:
  frontend:
    image: ${REGISTRY:-local}/shop-frontend:${IMAGE_TAG:-latest}
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  backend:
    image: ${REGISTRY:-local}/shop-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/shopdb
      - SPRING_DATASOURCE_USERNAME=shop_user
      - SPRING_DATASOURCE_PASSWORD=shop_pass
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=shop_user
      - POSTGRES_PASSWORD=shop_pass
      - POSTGRES_DB=shopdb
    ports:
      - "5432:5432"
    volumes:
      - shop_pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  shop_pgdata:
