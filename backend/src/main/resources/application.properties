spring.application.name=ecommerce

# Cấu hình kết nối DB (Sẽ bị ghi đè bởi biến môi trường trong Docker Compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shopdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:shop_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:shop_pass}

# Cho phép Hibernate tự động tạo bảng (Dùng cho môi trường dev/demo)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# Cấu hình CORS (Để frontend gọi API mà không bị chặn)
spring.mvc.cors.allowed-origins=*
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
